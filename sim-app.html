<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIM — Security Incident Mapping</title>
<style>
  :root{
    --bg: #0b1220;
    --panel: #121b2e;
    --panel-2: #17223a;
    --line: #24324d;
    --text: #e7ecf5;
    --muted: #8ea0bd;
    --alert: #ff5a4e;
    --alert-dim: #3a1c1c;
    --safe: #35c98c;
    --amber: #f2b544;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height:100vh;
  }
  header{
    padding:22px 20px 18px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    gap:12px;
  }
  .mark{
    width:34px;height:34px;border-radius:8px;
    background:linear-gradient(135deg,var(--alert),var(--amber));
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;color:#0b1220;
    flex-shrink:0;
  }
  header h1{
    font-size:16px;
    letter-spacing:0.04em;
    margin:0;
    font-weight:700;
  }
  header p{
    margin:2px 0 0;
    font-size:12px;
    color:var(--muted);
  }
  nav{
    display:flex;
    border-bottom:1px solid var(--line);
    background:var(--panel);
  }
  nav button{
    flex:1;
    padding:13px 10px;
    background:none;
    border:none;
    color:var(--muted);
    font-size:13px;
    font-weight:600;
    letter-spacing:0.02em;
    cursor:pointer;
    border-bottom:2px solid transparent;
  }
  nav button.active{
    color:var(--text);
    border-bottom:2px solid var(--alert);
  }
  main{
    padding:20px 16px 60px;
    max-width:520px;
    margin:0 auto;
  }
  .view{display:none;}
  .view.active{display:block;}

  .field{margin-bottom:16px;}
  .field label{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--muted);
    margin-bottom:6px;
    letter-spacing:0.02em;
  }
  select, input[type=text], textarea{
    width:100%;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    padding:11px 12px;
    color:var(--text);
    font-size:14px;
    font-family:inherit;
  }
  select:focus, input:focus, textarea:focus{
    outline:none;
    border-color:var(--alert);
  }
  textarea{resize:vertical;min-height:80px;}

  .toggle-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px 14px;
    margin-bottom:18px;
  }
  .toggle-row span{font-size:13px;}
  .switch{
    position:relative;
    width:42px;height:24px;
    background:var(--line);
    border-radius:20px;
    cursor:pointer;
    transition:.2s;
    flex-shrink:0;
  }
  .switch.on{background:var(--safe);}
  .switch::after{
    content:'';
    position:absolute;top:2px;left:2px;
    width:20px;height:20px;
    background:#fff;
    border-radius:50%;
    transition:.2s;
  }
  .switch.on::after{transform:translateX(18px);}

  .submit-btn{
    width:100%;
    padding:14px;
    background:var(--alert);
    color:#1a0808;
    border:none;
    border-radius:8px;
    font-size:14px;
    font-weight:700;
    letter-spacing:0.03em;
    cursor:pointer;
  }
  .submit-btn:active{opacity:0.85;}

  .confirm{
    display:none;
    background:var(--alert-dim);
    border:1px solid var(--alert);
    color:#ffb3ac;
    padding:12px 14px;
    border-radius:8px;
    font-size:13px;
    margin-top:14px;
  }

  .report-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:12px;
  }
  .report-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:8px;
  }
  .report-type{
    font-size:13px;
    font-weight:700;
    color:var(--text);
  }
  .badge{
    font-size:10px;
    font-weight:700;
    padding:3px 8px;
    border-radius:20px;
    letter-spacing:0.03em;
    text-transform:uppercase;
  }
  .badge.new{background:var(--alert-dim);color:var(--alert);}
  .report-meta{
    font-size:11px;
    color:var(--muted);
    margin-bottom:6px;
  }
  .report-desc{
    font-size:13px;
    color:var(--text);
    line-height:1.5;
  }
  .empty{
    text-align:center;
    color:var(--muted);
    font-size:13px;
    padding:50px 20px;
    border:1px dashed var(--line);
    border-radius:10px;
  }
  .stats{
    display:flex;
    gap:10px;
    margin-bottom:18px;
  }
  .stat{
    flex:1;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px;
    text-align:center;
  }
  .stat .n{font-size:20px;font-weight:800;}
  .stat .l{font-size:10px;color:var(--muted);letter-spacing:0.03em;text-transform:uppercase;margin-top:2px;}
</style>
</head>
<body>

<header>
  <div class="mark">S</div>
  <div>
    <h1>SIM — SECURITY INCIDENT MAPPING</h1>
    <p>Report and track campus security incidents</p>
  </div>
</header>

<nav>
  <button class="active" onclick="showView('report')">Report</button>
  <button onclick="showView('list')">All Reports</button>
</nav>

<main>

  <!-- REPORT VIEW -->
  <section id="report" class="view active">
    <div class="field">
      <label>Type of incident</label>
      <select id="type">
        <option>Theft / Stealing</option>
        <option>Stabbing</option>
        <option>Rape / Sexual Assault</option>
        <option>Murder</option>
        <option>Kidnapping</option>
        <option>Other</option>
      </select>
    </div>

    <div class="field">
      <label>Location</label>
      <input type="text" id="location" placeholder="e.g. Behind Male Hostel Block C">
    </div>

    <div class="field">
      <label>Description</label>
      <textarea id="description" placeholder="Briefly describe what happened..."></textarea>
    </div>

    <div class="toggle-row">
      <span>Report anonymously</span>
      <div class="switch on" id="anonToggle" onclick="this.classList.toggle('on')"></div>
    </div>

    <button class="submit-btn" onclick="submitReport()">Submit Report</button>
    <div class="confirm" id="confirmMsg">Report submitted. Thank you — it has been logged.</div>
  </section>

  <!-- LIST VIEW -->
  <section id="list" class="view">
    <div class="stats">
      <div class="stat"><div class="n" id="statTotal">0</div><div class="l">Total</div></div>
      <div class="stat"><div class="n" id="statAnon">0</div><div class="l">Anonymous</div></div>
      <div class="stat"><div class="n" id="statToday">0</div><div class="l">Today</div></div>
    </div>
    <div id="reportsContainer"></div>
  </section>

</main>

<script>
  let reports = [];

  function showView(id){
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
    if(id === 'list') renderReports();
  }

  function submitReport(){
    const type = document.getElementById('type').value;
    const location = document.getElementById('location').value.trim();
    const description = document.getElementById('description').value.trim();
    const anonymous = document.getElementById('anonToggle').classList.contains('on');

    if(!location || !description){
      alert('Please fill in the location and description.');
      return;
    }

    reports.unshift({
      type, location, description, anonymous,
      time: new Date()
    });

    document.getElementById('location').value = '';
    document.getElementById('description').value = '';

    const msg = document.getElementById('confirmMsg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);
  }

  function renderReports(){
    const container = document.getElementById('reportsContainer');
    document.getElementById('statTotal').textContent = reports.length;
    document.getElementById('statAnon').textContent = reports.filter(r => r.anonymous).length;
    const today = new Date().toDateString();
    document.getElementById('statToday').textContent = reports.filter(r => r.time.toDateString() === today).length;

    if(reports.length === 0){
      container.innerHTML = '<div class="empty">No reports yet. Submitted reports will appear here.</div>';
      return;
    }

    container.innerHTML = reports.map(r => `
      <div class="report-card">
        <div class="report-top">
          <span class="report-type">${r.type}</span>
          <span class="badge new">${r.anonymous ? 'Anonymous' : 'Identified'}</span>
        </div>
        <div class="report-meta">${r.location} · ${r.time.toLocaleString()}</div>
        <div class="report-desc">${r.description}</div>
      </div>
    `).join('');
  }
</script>

</body>
</html>
